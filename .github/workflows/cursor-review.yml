name: Cursor Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cursor-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI code review
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Review pull request
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          agent --force --print \
            "Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

          Use 'gh pr diff ${{ github.event.pull_request.number }}' to read changes.

          Focus on:
          - Bugs and logic errors
          - Security issues
          - Accessibility regressions (WCAG)
          - Missing tests for changed behaviour

          Rules:
          - Flag only high and medium severity issues
          - Maximum 10 inline comments
          - Do not approve or request changes
          - Post a single summary comment via 'gh pr comment' if gh pr review is unavailable
          - Do not modify files, commit, or push"
